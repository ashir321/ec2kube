###############################################################################
# env.conf — Required Inputs for EKS Zero-Touch Deployment
#
# Fill in every value marked REQUIRED before running deploy-eks.sh.
# Values with defaults are optional to change.
###############################################################################

# ── REQUIRED ─────────────────────────────────────────────────────────────────
# AWS account ID (12-digit number)
AWS_ACCOUNT_ID=""

# Cluster name — must be unique within the region
CLUSTER_NAME="ec2kube-eks"

# AWS region
AWS_REGION="us-east-1"

# S3 bucket for Terraform state (must already exist or FIRST_DEPLOY=Y)
STATE_BUCKET=""

# SSH public key for node access (optional, leave empty to skip key pair)
SSH_PUBLIC_KEY=""

# ── IDENTITY MODE ────────────────────────────────────────────────────────────
# Options: pod-identity | irsa | both
AUTH_MODE="pod-identity"

# ── KUBERNETES / EKS ─────────────────────────────────────────────────────────
K8S_VERSION="1.34"

# ── KARPENTER ────────────────────────────────────────────────────────────────
# Karpenter version — must be compatible with K8S_VERSION
KARPENTER_VERSION="1.3.0"
KARPENTER_NAMESPACE="kube-system"

# ── NODE DEFAULTS ────────────────────────────────────────────────────────────
# Instance families Karpenter may launch (comma-separated)
INSTANCE_FAMILIES="m5,m6i,m7i,c5,c6i,c7i,r5,r6i,r7i"

# Capacity type: on-demand, spot, or both (comma-separated)
CAPACITY_TYPES="on-demand,spot"

# Architecture
ARCHITECTURES="amd64"

# NodePool CPU limits
NODEPOOL_CPU_LIMIT="100"

# NodePool memory limit (Gi)
NODEPOOL_MEMORY_LIMIT="400"

# Time-to-live for nodes after they become empty (consolidation)
CONSOLIDATION_POLICY="WhenEmptyOrUnderutilized"

# Seconds to wait after a node becomes empty before removing it
CONSOLIDATE_AFTER="30s"

# Node expiry — force rotation after this duration (0s = never)
EXPIRE_AFTER="720h"

# ── VPC / NETWORKING ─────────────────────────────────────────────────────────
# Leave empty to auto-create a VPC with eksctl
# Set to an existing VPC ID to reuse it
EXISTING_VPC_ID=""

# If EXISTING_VPC_ID is set, provide subnet IDs (comma-separated)
EXISTING_PRIVATE_SUBNET_IDS=""
EXISTING_PUBLIC_SUBNET_IDS=""

# ── MANAGED NODE GROUP (bootstrap / initial) ────────────────────────────────
# A small managed node group is created first so that Karpenter pods
# have somewhere to run. After Karpenter is healthy you may scale it
# down or remove it.
MNG_INSTANCE_TYPE="m5.large"
MNG_MIN_SIZE="2"
MNG_MAX_SIZE="3"
MNG_DESIRED_SIZE="2"

# ── TEST WORKLOAD ────────────────────────────────────────────────────────────
TEST_NAMESPACE="eks-validation"
TEST_DEPLOYMENT_NAME="inflate"
TEST_REPLICAS="5"

# ── OPERATIONAL ──────────────────────────────────────────────────────────────
# Maximum seconds to wait for a resource to become ready
WAIT_TIMEOUT="600"

# Seconds between retry polls
POLL_INTERVAL="15"

# Set to Y on very first run to create state bucket
FIRST_DEPLOY="N"
