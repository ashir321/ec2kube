# NodePool — Karpenter v1 API (karpenter.sh/v1)
#
# This defines WHAT Karpenter should provision:
#   - Instance families and sizes
#   - Capacity types (on-demand and/or spot)
#   - Architecture and OS requirements
#   - Resource limits (CPU/memory budget)
#   - Disruption / consolidation policy
#   - Node expiry for rotation
#
# The nodeClassRef links to the EC2NodeClass that defines HOW to launch.
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-purpose
spec:
  template:
    metadata:
      labels:
        intent: apps
        managed-by: karpenter
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        # Instance families — broad selection for cost optimization
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - m5
            - m6i
            - m7i
            - c5
            - c6i
            - c7i
            - r5
            - r6i
            - r7i
        # Mix of on-demand and spot for cost savings with reliability
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
            - spot
        # x86_64 architecture
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        # Linux only
        - key: kubernetes.io/os
          operator: In
          values:
            - linux
      # Force node rotation after 30 days
      expireAfter: 720h
  disruption:
    # Consolidate when nodes are empty or underutilized
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
  # Resource budget — prevents runaway scaling
  limits:
    cpu: "100"
    memory: "400Gi"
  # Weight for multi-NodePool priority (higher = preferred)
  weight: 100
